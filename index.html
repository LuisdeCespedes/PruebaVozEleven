<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAU · Sermicro Soporte IT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090f;
      --surface: #0e1118;
      --surface2: #141820;
      --border: rgba(255,255,255,0.07);
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --green-glow: rgba(0,232,122,0.25);
      --red: #ff3b5c;
      --text: #f0f2f7;
      --muted: rgba(240,242,247,0.4);
      --subtle: rgba(240,242,247,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,232,122,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow:
        0 0 0 1px rgba(0,232,122,0.04),
        0 32px 64px rgba(0,0,0,0.6),
        0 0 80px rgba(0,232,122,0.03);
    }

    .logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      height: 28px;
      width: auto;
      opacity: 0.85;
      filter: brightness(0) invert(1);
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .avatar-ring {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .avatar-ring::before,
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--green);
      opacity: 0;
    }

    .avatar-ring.ringing::before {
      animation: pulse-ring 2s ease-out infinite;
    }

    .avatar-ring.ringing::after {
      animation: pulse-ring 2s ease-out infinite 0.6s;
    }

    .avatar-ring.connected::before {
      animation: breathe 2.5s ease-in-out infinite;
      opacity: 0.3;
      inset: -4px;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.9); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.05); }
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a2235 0%, #0e1520 100%);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      position: relative;
      overflow: hidden;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), transparent 60%);
    }

    .agent-name {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .agent-role {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
      text-align: center;
    }

    .status-bar {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--subtle);
      flex-shrink: 0;
    }

    .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.calling { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1s ease-in-out infinite; }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .timer {
      color: var(--muted);
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      min-width: 40px;
      text-align: right;
    }

    .info-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }

    .info-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0 2px;
    }

    .info-item span:last-child {
      color: var(--subtle);
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-call {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.2s ease;
      position: relative;
      margin-bottom: 12px;
      outline: none;
    }

    .btn-call.call-start {
      background: var(--green);
      box-shadow: 0 0 0 0 var(--green-glow), 0 8px 24px rgba(0,232,122,0.3);
      animation: call-pulse 2.5s ease-in-out infinite;
    }

    .btn-call.call-start:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 8px var(--green-dim), 0 12px 32px rgba(0,232,122,0.4);
    }

    .btn-call.call-end {
      background: var(--red);
      box-shadow: 0 8px 24px rgba(255,59,92,0.3);
      animation: none;
    }

    .btn-call.call-end:hover {
      transform: scale(1.06);
      box-shadow: 0 12px 32px rgba(255,59,92,0.4);
    }

    @keyframes call-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--green-glow), 0 8px 24px rgba(0,232,122,0.3); }
      50% { box-shadow: 0 0 0 10px rgba(0,232,122,0), 0 8px 24px rgba(0,232,122,0.3); }
    }

    .btn-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 24px 0 16px;
    }

    .footer-note {
      font-size: 0.65rem;
      color: var(--subtle);
      text-align: center;
      letter-spacing: 0.5px;
      line-height: 1.6;
    }

    elevenlabs-convai {
      position: fixed !important;
      bottom: -9999px !important;
      right: -9999px !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <img src="images/logo.png" alt="Sermicro">
    </div>

    <div class="avatar-section">
      <div class="avatar-ring" id="avatarRing">
        <div class="avatar">🎧</div>
      </div>
      <div>
	<div class="agent-name">LUZ IA</div>
	<div class="agent-role">Asistente CAU · Soporte IT</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-indicator">
        <div class="dot online" id="statusDot"></div>
        <span id="statusText">Disponible</span>
      </div>
      <div class="timer" id="timer">--:--</div>
    </div>

    <div class="info-row">
      <div class="info-item">
        <span>Departamento</span>
        <span>CAU · N1</span>
      </div>
      <div class="info-item">
        <span>Cobertura</span>
        <span>ES · 24/7</span>
      </div>
      <div class="info-item">
        <span>Idioma</span>
        <span>Castellano</span>
      </div>
    </div>

    <button class="btn-call call-start" id="callBtn" onclick="toggleCall()">
      📞
    </button>
    <span class="btn-label" id="btnLabel">Iniciar llamada</span>

    <div class="divider"></div>

    <p class="footer-note">
      Tu llamada puede ser grabada con fines de calidad.<br>
      Powered by Sermicro AI · sermicro.com
    </p>

  </div>

  <elevenlabs-convai agent-id="agent_0701kwn0q915ew78vgnfc75bnn46" id="elWidget"></elevenlabs-convai>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    let callActive = false;
    let timerInterval = null;
    let seconds = 0;

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sc = (s % 60).toString().padStart(2, '0');
      return m + ':' + sc;
    }

    function toggleCall() {
      const btn = document.getElementById('callBtn');
      const label = document.getElementById('btnLabel');
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const ring = document.getElementById('avatarRing');
      const timer = document.getElementById('timer');
      const widget = document.getElementById('elWidget');

      if (!callActive) {
        callActive = true;
        btn.className = 'btn-call call-end';
        btn.textContent = '📵';
        label.textContent = 'Colgar';
        dot.className = 'dot calling';
        statusText.textContent = 'Conectando…';
        ring.className = 'avatar-ring ringing';

        widget.style.pointerEvents = 'auto';

        setTimeout(() => {
          try {
            const shadowBtn = widget.shadowRoot && widget.shadowRoot.querySelector('button');
            if (shadowBtn) shadowBtn.click();
          } catch(e) {}
          dot.className = 'dot connected';
          statusText.textContent = 'En llamada';
          ring.className = 'avatar-ring connected';
          seconds = 0;
          timerInterval = setInterval(function() {
            seconds++;
            timer.textContent = formatTime(seconds);
          }, 1000);
        }, 1200);

      } else {
        callActive = false;
        btn.className = 'btn-call call-start';
        btn.textContent = '📞';
        label.textContent = 'Iniciar llamada';
        dot.className = 'dot online';
        statusText.textContent = 'Disponible';
        ring.className = 'avatar-ring';
        timer.textContent = '--:--';
        clearInterval(timerInterval);
        widget.style.pointerEvents = 'none';

        try {
          const shadowBtn = widget.shadowRoot && widget.shadowRoot.querySelector('button');
          if (shadowBtn) shadowBtn.click();
        } catch(e) {}
      }
    }
  </script>

</body>
</html>
