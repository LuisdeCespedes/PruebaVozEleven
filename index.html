<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CAU · Sermicro Soporte IT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080d;
            --surface: #0b0f17;
            --surface2: #111620;
            --surface3: #181d28;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 255, 255, 0.1);
            --green: #00e87a;
            --green-bright: #1aff94;
            --green-dim: rgba(0, 232, 122, 0.1);
            --green-glow: rgba(0, 232, 122, 0.3);
            --red: #ff3b5c;
            --red-glow: rgba(255, 59, 92, 0.35);
            --amber: #f59e0b;
            --text: #eef1f7;
            --text-secondary: #b0b8c5;
            --muted: rgba(176, 184, 197, 0.5);
            --subtle: rgba(176, 184, 197, 0.2);
            --radius: clamp(12px, 3vw, 20px);
            --radius-sm: clamp(8px, 2vw, 10px);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: clamp(12px, 4vw, 20px);
            position: relative;
            overflow: hidden;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(0, 232, 122, 0.025) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 150, 200, 0.02) 0%, transparent 60%);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .bg-particles span {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--green);
            border-radius: 50%;
            animation: float-up 8s infinite ease-in;
            opacity: 0;
        }
        .bg-particles span:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 9s; }
        .bg-particles span:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 11s; }
        .bg-particles span:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 7s; }
        .bg-particles span:nth-child(4) { left: 55%; animation-delay: 1s; animation-duration: 10s; }
        .bg-particles span:nth-child(5) { left: 70%; animation-delay: 3s; animation-duration: 8s; }
        .bg-particles span:nth-child(6) { left: 85%; animation-delay: 5s; animation-duration: 12s; }
        .bg-particles span:nth-child(7) { left: 15%; animation-delay: 6s; animation-duration: 9s; }
        .bg-particles span:nth-child(8) { left: 60%; animation-delay: 7s; animation-duration: 11s; }

        @keyframes float-up {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow:
                0 1px 0 var(--border-active) inset,
                0 0 0 1px rgba(0, 232, 122, 0.02),
                0 24px 64px rgba(0, 0, 0, 0.7),
                0 0 100px rgba(0, 232, 122, 0.02);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: clamp(14px, 3vw, 18px) clamp(16px, 4vw, 22px);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .card-header-left {
            display: flex;
            align-items: center;
            gap: clamp(6px, 2vw, 10px);
        }
        .logo-img {
            height: clamp(22px, 5vw, 28px);
            width: auto;
            opacity: 0.9;
            filter: brightness(0) invert(1);
        }
        .badge-cau {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.55rem, 1.5vw, 0.6rem);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--green);
            background: var(--green-dim);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 232, 122, 0.2);
            white-space: nowrap;
        }

        .card-body {
            padding: clamp(20px, 5vw, 28px) clamp(16px, 4vw, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(16px, 4vw, 22px);
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 3vw, 14px);
        }
        .avatar-outer-ring {
            position: relative;
            width: clamp(90px, 20vw, 110px);
            height: clamp(90px, 20vw, 110px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-outer-ring::before,
        .avatar-outer-ring::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1.5px solid var(--green);
            opacity: 0;
            pointer-events: none;
        }
        .avatar-outer-ring.calling::before {
            animation: pulse-ring 1.8s ease-out infinite;
            opacity: 0.5;
        }
        .avatar-outer-ring.calling::after {
            animation: pulse-ring 1.8s ease-out infinite 0.5s;
            opacity: 0.3;
        }
        .avatar-outer-ring.connected::before {
            animation: breathe-ring 2.8s ease-in-out infinite;
            opacity: 0.35;
            inset: -6px;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.85); opacity: 0.6; }
            100% { transform: scale(1.55); opacity: 0; }
        }
        @keyframes breathe-ring {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.06); opacity: 0.45; }
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #151d2a 0%, #0a0f17 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .avatar-inner .avatar-icon {
            font-size: clamp(2rem, 8vw, 2.6rem);
            filter: grayscale(0.1);
            position: relative;
            z-index: 1;
        }
        .avatar-inner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.06), transparent 55%);
        }
        .agent-name {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        .agent-role {
            font-size: clamp(0.6rem, 2vw, 0.7rem);
            color: var(--muted);
            letter-spacing: 1.6px;
            text-transform: uppercase;
            text-align: center;
            margin-top: -2px;
        }

        .status-bar {
            width: 100%;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 16px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.6rem, 1.8vw, 0.68rem);
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            white-space: nowrap;
        }
        .dot {
            width: clamp(6px, 2vw, 8px);
            height: clamp(6px, 2vw, 8px);
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--subtle);
            transition: all 0.3s ease;
        }
        .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
        .dot.calling { background: var(--amber); box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); animation: blink-dot 0.8s ease-in-out infinite; }
        .dot.connected { background: var(--green); box-shadow: 0 0 10px var(--green-glow); }
        .dot.ended { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .timer-display {
            color: var(--text-secondary);
            font-weight: 500;
            min-width: 38px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(6px, 2vw, 8px);
        }
        .info-cell {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: clamp(8px, 2vw, 12px) clamp(10px, 3vw, 14px);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-cell .info-label {
            font-size: clamp(0.55rem, 1.5vw, 0.62rem);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
        }
        .info-cell .info-value {
            font-size: clamp(0.7rem, 2vw, 0.78rem);
            font-weight: 500;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
        }

        .call-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn-call {
            width: clamp(60px, 16vw, 72px);
            height: clamp(60px, 16vw, 72px);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.3rem, 5vw, 1.6rem);
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn-call:active { transform: scale(0.94); }
        .btn-call.call-start {
            background: var(--green);
            color: #000;
            box-shadow: 0 10px 28px rgba(0, 232, 122, 0.3);
        }
        .btn-call.call-start:hover {
            box-shadow: 0 14px 36px rgba(0, 232, 122, 0.45);
            transform: scale(1.07);
        }
        .btn-call.call-end {
            background: var(--red);
            color: #fff;
            box-shadow: 0 10px 28px var(--red-glow);
        }
        .btn-call.call-end:hover {
            box-shadow: 0 14px 36px rgba(255, 59, 92, 0.5);
            transform: scale(1.07);
        }
        .btn-label {
            font-size: clamp(0.6rem, 2vw, 0.68rem);
            color: var(--muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            transition: color 0.3s;
        }
        .btn-label.active { color: var(--red); }

        .card-footer {
            padding: clamp(12px, 3vw, 16px) clamp(16px, 4vw, 24px);
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .card-footer p {
            font-size: clamp(0.55rem, 1.5vw, 0.62rem);
            color: var(--subtle);
            letter-spacing: 0.6px;
            line-height: 1.7;
        }
        .card-footer .footer-brand { color: var(--muted); font-weight: 500; }

        .version-tag {
            position: absolute;
            top: 6px;
            right: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.5rem, 1.5vw, 0.55rem);
            color: var(--muted);
            background: var(--surface3);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            z-index: 2;
        }

        /* Ajustes específicos para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .status-left span {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 320px) {
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .badge-cau {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>

    <div class="bg-particles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="card">
        <span class="version-tag">v10</span>

        <div class="card-header">
            <div class="card-header-left">
                <img src="images/logo.png" alt="Sermicro" class="logo-img"
                    onerror="this.outerHTML='<span style=&quot;font-weight:700;font-size:clamp(14px,4vw,18px);letter-spacing:1px;color:var(--text)&quot;>SER<span style=&quot;color:var(--green)&quot;>MICRO</span></span>'">
            </div>
            <span class="badge-cau">CAU · N1</span>
        </div>

        <div class="card-body">
            <div class="avatar-section">
                <div class="avatar-outer-ring" id="avatarRing">
                    <div class="avatar-inner">
                        <span class="avatar-icon">🎧</span>
                    </div>
                </div>
                <div>
                    <div class="agent-name">LUZ IA</div>
                    <div class="agent-role">Asistente CAU · Soporte IT</div>
                </div>
            </div>

            <div class="status-bar">
                <div class="status-left">
                    <span class="dot online" id="statusDot"></span>
                    <span id="statusText">Agente disponible</span>
                </div>
                <span class="timer-display" id="timerDisplay">--:--</span>
            </div>

            <div class="info-grid">
                <div class="info-cell">
                    <span class="info-label">Departamento</span>
                    <span class="info-value">CAU · N1</span>
                </div>
                <div class="info-cell">
                    <span class="info-label">Cobertura</span>
                    <span class="info-value">ES · 24/7</span>
                </div>
                <div class="info-cell">
                    <span class="info-label">Idioma</span>
                    <span class="info-value">Castellano</span>
                </div>
                <div class="info-cell">
                    <span class="info-label">Tickets hoy</span>
                    <span class="info-value" id="ticketCount">47</span>
                </div>
            </div>

            <div class="call-btn-wrapper">
                <button class="btn-call call-start" id="callBtn" title="Iniciar llamada con LUZ IA" aria-label="Iniciar llamada">
                    📞
                </button>
                <span class="btn-label" id="btnLabel">Iniciar llamada</span>
            </div>
        </div>

        <div class="card-footer">
            <p>
                Tu llamada puede ser grabada con fines de calidad.<br>
                <span class="footer-brand">CREADO POR LUISDE CÉSPEDES</span> · sermicro.com
            </p>
        </div>
    </div>

    <script type="module">
        import { Conversation } from 'https://cdn.jsdelivr.net/npm/@elevenlabs/client/+esm';

        const AGENT_ID = 'agent_0701kwn0q915ew78vgnfc75bnn46';
        const API_KEY = 'sk_fdc782ab040fd94ebadf797817f37a195b22218e27c4d98b';

        let conversation = null;
        let callActive = false;
        let timerInterval = null;
        let seconds = 0;

        const callBtn = document.getElementById('callBtn');
        const btnLabel = document.getElementById('btnLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const avatarRing = document.getElementById('avatarRing');
        const timerDisplay = document.getElementById('timerDisplay');
        const ticketCount = document.getElementById('ticketCount');

        function formatTime(s) {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            return m + ':' + sc;
        }

        function randomTickets() {
            return Math.floor(Math.random() * 30) + 30;
        }

        function updateUIForCall() {
            callBtn.className = 'btn-call call-end';
            callBtn.textContent = '📵';
            btnLabel.textContent = 'Colgar llamada';
            btnLabel.classList.add('active');
            statusDot.className = 'dot calling';
            statusText.textContent = 'Conectando…';
            avatarRing.className = 'avatar-outer-ring calling';
            timerDisplay.textContent = '--:--';
        }

        function updateUIForConnected() {
            statusDot.className = 'dot connected';
            statusText.textContent = 'En llamada · LUZ IA';
            avatarRing.className = 'avatar-outer-ring connected';
            seconds = 0;
            timerDisplay.textContent = formatTime(0);
            timerInterval = setInterval(() => {
                seconds++;
                timerDisplay.textContent = formatTime(seconds);
            }, 1000);
            callActive = true;
        }

        function resetUI() {
            callActive = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            seconds = 0;
            callBtn.className = 'btn-call call-start';
            callBtn.textContent = '📞';
            btnLabel.textContent = 'Iniciar llamada';
            btnLabel.classList.remove('active');
            statusDot.className = 'dot online';
            statusText.textContent = 'Agente disponible';
            avatarRing.className = 'avatar-outer-ring';
            timerDisplay.textContent = '--:--';
        }

        async function startCall() {
            if (callActive || conversation) return;

            updateUIForCall();

            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log('✅ Micrófono concedido');

                conversation = await Conversation.startSession({
                    agentId: AGENT_ID,
                    apiKey: API_KEY,
                    connectionType: 'webrtc',
                    onConnect: () => {
                        console.log('✅ Conectado al agente');
                        updateUIForConnected();
                    },
                    onDisconnect: () => {
                        console.log('🔌 Desconectado');
                        conversation = null;
                        resetUI();
                    },
                    onError: (error) => {
                        console.error('❌ Error en conversación:', error);
                        conversation = null;
                        resetUI();
                        alert('Error durante la llamada. Revisa la consola.');
                    },
                    onModeChange: (mode) => {
                        if (!callActive) return;
                        statusText.textContent = mode.mode === 'speaking'
                            ? 'LUZ IA hablando…'
                            : 'En llamada · LUZ IA';
                    }
                });
                console.log('🎤 Sesión iniciada');
            } catch (err) {
                console.error('Error al iniciar la llamada:', err);
                conversation = null;
                resetUI();
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    alert('Permiso de micrófono denegado. Concede el acceso al micrófono para hablar con LUZ IA.');
                } else {
                    alert('No se pudo iniciar la llamada. Error: ' + (err.message || 'desconocido'));
                }
            }
        }

        async function endCall() {
            if (!conversation) return;
            try {
                await conversation.endSession();
                console.log('🔚 Llamada finalizada manualmente');
            } catch (e) {
                console.warn('Error al colgar:', e);
            }
            conversation = null;
            resetUI();
        }

        callBtn.addEventListener('click', () => {
            if (callActive || conversation) {
                endCall();
            } else {
                startCall();
            }
        });

        setInterval(() => {
            if (!callActive && Math.random() < 0.3) {
                ticketCount.textContent = randomTickets();
            }
        }, 15000);
        ticketCount.textContent = randomTickets();
    </script>
</body>
</html>
