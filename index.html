<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAU · Sermicro Soporte IT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #06080d;
            --surface: #0b0f17;
            --surface2: #111620;
            --surface3: #181d28;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(255, 255, 255, 0.1);
            --green: #00e87a;
            --green-bright: #1aff94;
            --green-dim: rgba(0, 232, 122, 0.1);
            --green-glow: rgba(0, 232, 122, 0.3);
            --red: #ff3b5c;
            --red-glow: rgba(255, 59, 92, 0.35);
            --amber: #f59e0b;
            --text: #eef1f7;
            --text-secondary: #b0b8c5;
            --muted: rgba(176, 184, 197, 0.5);
            --subtle: rgba(176, 184, 197, 0.2);
            --radius: 16px;
            --radius-sm: 10px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(0, 232, 122, 0.025) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 150, 200, 0.02) 0%, transparent 60%);
        }

        /* Grid sutil de fondo */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* Partículas sutiles (solo decoración) */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .bg-particles span {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--green);
            border-radius: 50%;
            animation: float-up 8s infinite ease-in;
            opacity: 0;
        }
        .bg-particles span:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
            animation-duration: 9s;
        }
        .bg-particles span:nth-child(2) {
            left: 25%;
            animation-delay: 2s;
            animation-duration: 11s;
        }
        .bg-particles span:nth-child(3) {
            left: 40%;
            animation-delay: 4s;
            animation-duration: 7s;
        }
        .bg-particles span:nth-child(4) {
            left: 55%;
            animation-delay: 1s;
            animation-duration: 10s;
        }
        .bg-particles span:nth-child(5) {
            left: 70%;
            animation-delay: 3s;
            animation-duration: 8s;
        }
        .bg-particles span:nth-child(6) {
            left: 85%;
            animation-delay: 5s;
            animation-duration: 12s;
        }
        .bg-particles span:nth-child(7) {
            left: 15%;
            animation-delay: 6s;
            animation-duration: 9s;
        }
        .bg-particles span:nth-child(8) {
            left: 60%;
            animation-delay: 7s;
            animation-duration: 11s;
        }

        @keyframes float-up {
            0% {
                transform: translateY(105vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* Tarjeta principal */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            box-shadow:
                0 1px 0 var(--border-active) inset,
                0 0 0 1px rgba(0, 232, 122, 0.02),
                0 24px 64px rgba(0, 0, 0, 0.7),
                0 0 100px rgba(0, 232, 122, 0.02);
            overflow: hidden;
        }

        /* Header */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-text {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--text);
            text-transform: uppercase;
        }
        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green-glow);
            animation: logo-pulse 2s ease-in-out infinite;
        }
        @keyframes logo-pulse {
            0%,
            100% {
                box-shadow: 0 0 6px var(--green-glow);
            }
            50% {
                box-shadow: 0 0 16px var(--green), 0 0 24px var(--green-glow);
            }
        }
        .badge-cau {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--green);
            background: var(--green-dim);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 232, 122, 0.2);
        }

        /* Cuerpo */
        .card-body {
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        /* Avatar */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .avatar-outer-ring {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-outer-ring::before,
        .avatar-outer-ring::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1.5px solid var(--green);
            opacity: 0;
            pointer-events: none;
        }
        .avatar-outer-ring.calling::before {
            animation: pulse-ring 1.8s ease-out infinite;
            opacity: 0.5;
        }
        .avatar-outer-ring.calling::after {
            animation: pulse-ring 1.8s ease-out infinite 0.5s;
            opacity: 0.3;
        }
        .avatar-outer-ring.connected::before {
            animation: breathe-ring 2.8s ease-in-out infinite;
            opacity: 0.35;
            inset: -6px;
        }
        @keyframes pulse-ring {
            0% {
                transform: scale(0.85);
                opacity: 0.6;
            }
            100% {
                transform: scale(1.55);
                opacity: 0;
            }
        }
        @keyframes breathe-ring {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.06);
                opacity: 0.45;
            }
        }
        .avatar-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #151d2a 0%, #0a0f17 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .avatar-inner .avatar-icon {
            font-size: 2.6rem;
            filter: grayscale(0.1);
            position: relative;
            z-index: 1;
        }
        .avatar-inner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.06), transparent 55%);
        }
        .agent-name {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text);
        }
        .agent-role {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1.6px;
            text-transform: uppercase;
            text-align: center;
            margin-top: -2px;
        }

        /* Barra de estado */
        .status-bar {
            width: 100%;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--subtle);
            transition: all 0.3s ease;
        }
        .dot.online {
            background: var(--green);
            box-shadow: 0 0 8px var(--green-glow);
        }
        .dot.calling {
            background: var(--amber);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
            animation: blink-dot 0.8s ease-in-out infinite;
        }
        .dot.connected {
            background: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }
        .dot.ended {
            background: var(--red);
            box-shadow: 0 0 6px var(--red-glow);
        }
        @keyframes blink-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .timer-display {
            color: var(--text-secondary);
            font-weight: 500;
            min-width: 38px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        /* Info rows */
        .info-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-cell {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-cell .info-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--muted);
        }
        .info-cell .info-value {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Botón de llamada */
        .call-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .btn-call {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn-call:active {
            transform: scale(0.94);
        }
        .btn-call.call-start {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 0 0 var(--green-glow), 0 10px 28px rgba(0, 232, 122, 0.3);
            animation: btn-glow-green 2.6s ease-in-out infinite;
        }
        .btn-call.call-start:hover {
            box-shadow: 0 0 0 12px var(--green-dim), 0 14px 36px rgba(0, 232, 122, 0.45);
            transform: scale(1.07);
        }
        @keyframes btn-glow-green {
            0%,
            100% {
                box-shadow: 0 0 0 0 var(--green-glow), 0 10px 28px rgba(0, 232, 122, 0.3);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(0, 232, 122, 0), 0 10px 28px rgba(0, 232, 122, 0.4);
            }
        }
        .btn-call.call-end {
            background: var(--red);
            color: #fff;
            box-shadow: 0 10px 28px var(--red-glow);
            animation: none;
        }
        .btn-call.call-end:hover {
            box-shadow: 0 14px 36px rgba(255, 59, 92, 0.5);
            transform: scale(1.07);
        }
        .btn-label {
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            transition: color 0.3s;
        }
        .btn-label.active {
            color: var(--red);
        }

        /* Footer */
        .card-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .card-footer p {
            font-size: 0.62rem;
            color: var(--subtle);
            letter-spacing: 0.6px;
            line-height: 1.7;
        }
        .card-footer .footer-brand {
            color: var(--muted);
            font-weight: 500;
        }

        /* ---- Widget de ElevenLabs: oculto pero funcional ---- */
        #elWidget {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 1px !important;
            height: 1px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            clip-path: inset(50%) !important;
            z-index: -9999 !important;
            border: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
            /* no usamos display:none para que el navegador lo mantenga "vivo" y el audio funcione */
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                max-width: 100%;
                border-radius: 14px;
            }
            .card-body {
                padding: 20px 16px;
                gap: 16px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .btn-call {
                width: 62px;
                height: 62px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>

async

<script>
    (function() {
        // ────────────────────────────────────────
        // ESTADO
        // ────────────────────────────────────────
        let callActive = false;
        let timerInterval = null;
        let seconds = 0;
        let widgetReady = false;

        // ────────────────────────────────────────
        // REFERENCIAS AL DOM
        // ────────────────────────────────────────
        const callBtn = document.getElementById('callBtn');
        const btnLabel = document.getElementById('btnLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const avatarRing = document.getElementById('avatarRing');
        const timerDisplay = document.getElementById('timerDisplay');
        const ticketCount = document.getElementById('ticketCount');
        const widget = document.getElementById('elWidget');

        // ────────────────────────────────────────
        // UTILIDADES
        // ────────────────────────────────────────
        function formatTime(s) {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            return m + ':' + sc;
        }

        function randomTickets() {
            return Math.floor(Math.random() * 30) + 30;
        }

        /**
         * Busca el botón dentro del shadow DOM del widget.
         * El widget de ElevenLabs suele tener un <button> en su shadow root.
         * Intentamos varios selectores para ser robustos.
         */
        function findWidgetButton() {
            if (!widget || !widget.shadowRoot) return null;
            // Intentamos selectores comunes
            const selectors = [
                'button',
                '[role="button"]',
                '.start-call-btn',
                '[data-testid="call-button"]',
                'button[aria-label]',
            ];
            for (const sel of selectors) {
                const btn = widget.shadowRoot.querySelector(sel);
                if (btn) return btn;
            }
            // Si no encontramos nada, buscamos cualquier elemento clickeablee
            const allButtons = widget.shadowRoot.querySelectorAll('button, [role="button"]');
            if (allButtons.length > 0) return allButtons[0];
            return null;
        }

        /**
         * Hace clic en el botón interno del widget para iniciar/terminar la llamada.
         * Retorna true si pudo hacer clic, false si no.
         */
        function clickWidgetButton() {
            const btn = findWidgetButton();
            if (btn) {
                btn.click();
                console.log('✅ Clic en botón del widget de ElevenLabs');
                return true;
            }
            console.warn('⚠️ No se encontró el botón del widget en el shadow DOM');
            return false;
        }

        /**
         * Espera a que el widget esté listo (custom element definido y shadow DOM accesible).
         */
        function waitForWidget(timeoutMs = 8000) {
            return new Promise((resolve, reject) => {
                const startTime = Date.now();

                function check() {
                    // ¿Está definido el custom element?
                    if (!customElements.get('elevenlabs-convai') && Date.now() - startTime < timeoutMs) {
                        setTimeout(check, 200);
                        return;
                    }
                    // ¿Tiene shadowRoot?
                    if (widget && widget.shadowRoot) {
                        widgetReady = true;
                        console.log('✅ Widget de ElevenLabs listo');
                        resolve(true);
                        return;
                    }
                    if (Date.now() - startTime >= timeoutMs) {
                        console.warn('⚠️ Timeout esperando al widget de ElevenLabs');
                        reject(new Error('Timeout esperando al widget'));
                        return;
                    }
                    setTimeout(check, 200);
                }
                check();
            });
        }

        // ────────────────────────────────────────
        // INICIAR / TERMINAR LLAMADA
        // ────────────────────────────────────────
        function startCall() {
            if (callActive) return;

            callActive = true;

            // Actualizar UI a estado "conectando"
            callBtn.className = 'btn-call call-end';
            callBtn.textContent = '📵';
            btnLabel.textContent = 'Colgar llamada';
            btnLabel.classList.add('active');
            statusDot.className = 'dot calling';
            statusText.textContent = 'Conectando…';
            avatarRing.className = 'avatar-outer-ring calling';
            timerDisplay.textContent = '--:--';
            ticketCount.textContent = randomTickets();

            // Permitir interacción con el widget momentáneamente para el clic
            const prevPointerEvents = widget.style.pointerEvents;
            const prevZIndex = widget.style.zIndex;
            widget.style.pointerEvents = 'auto';
            widget.style.zIndex = '99999';

            // Pequeño delay para que el widget procese
            setTimeout(() => {
                const clicked = clickWidgetButton();

                // Restaurar ocultación del widget
                setTimeout(() => {
                    widget.style.pointerEvents = prevPointerEvents || 'none';
                    widget.style.zIndex = prevZIndex || '-9999';
                }, 300);

                if (clicked) {
                    // Transicionar a "conectado" tras un delay
                    setTimeout(() => {
                        if (callActive) {
                            statusDot.className = 'dot connected';
                            statusText.textContent = 'En llamada · LUZ IA';
                            avatarRing.className = 'avatar-outer-ring connected';
                            seconds = 0;
                            timerDisplay.textContent = formatTime(0);
                            timerInterval = setInterval(() => {
                                seconds++;
                                timerDisplay.textContent = formatTime(seconds);
                            }, 1000);
                        }
                    }, 1800);
                } else {
                    // Si no se pudo hacer clic, revertir
                    console.error('No se pudo iniciar la llamada. ¿Está el widget cargado?');
                    resetUI();
                }
            }, 400);
        }

        function endCall() {
            if (!callActive) return;

            // Intentar colgar en el widget
            widget.style.pointerEvents = 'auto';
            widget.style.zIndex = '99999';
            setTimeout(() => {
                clickWidgetButton();
                setTimeout(() => {
                    widget.style.pointerEvents = 'none';
                    widget.style.zIndex = '-9999';
                }, 300);
            }, 200);

            resetUI();
        }

        function resetUI() {
            callActive = false;
            clearInterval(timerInterval);
            timerInterval = null;
            seconds = 0;

            callBtn.className = 'btn-call call-start';
            callBtn.textContent = '📞';
            btnLabel.textContent = 'Iniciar llamada';
            btnLabel.classList.remove('active');
            statusDot.className = 'dot online';
            statusText.textContent = 'Agente disponible';
            avatarRing.className = 'avatar-outer-ring';
            timerDisplay.textContent = '--:--';
        }

        function toggleCall() {
            if (callActive) {
                endCall();
            } else {
                startCall();
            }
        }

        // Exponer toggleCall al scope global para el onclick inline
        window.toggleCall = toggleCall;

        // ────────────────────────────────────────
        // INICIALIZACIÓN
        // ────────────────────────────────────────
        waitForWidget(10000)
            .then(() => {
                console.log('🚀 CAU Sermicro listo. Widget de ElevenLabs operativo.');
                ticketCount.textContent = randomTickets();
            })
            .catch((err) => {
                console.warn('⚠️ El widget de ElevenLabs no se cargó a tiempo:', err.message);
                console.warn('👉 La llamada de voz podría no funcionar. Verifica el agent_id y la conexión.');
                // La UI sigue funcionando, pero la llamada no se iniciará
                ticketCount.textContent = randomTickets();
            });

        // ────────────────────────────────────────
        // TICKET COUNTER: simulación de actividad
        // ────────────────────────────────────────
        setInterval(() => {
            if (!callActive && Math.random() < 0.3) {
                ticketCount.textContent = randomTickets();
            }
        }, 15000);
    })();
</script>
</body>
</html>
